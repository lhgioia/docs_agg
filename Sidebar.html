<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-status {
      font-size: 11px;
      color: rgba(255,255,255,.8);
      font-style: italic;
      white-space: nowrap;
    }
    .header-btn {
      background: rgba(255,255,255,.18);
      border: none;
      border-radius: 50%;
      color: #fff;
      padding: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }
    .header-btn:hover { background: rgba(255,255,255,.3); }
    .header-btn:disabled { opacity: .5; cursor: default; }

    [data-tooltip] { position: relative; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: 11px;
      font-weight: 400;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .1s;
      z-index: 20;
    }
    [data-tooltip]:hover::after {
      opacity: 1;
      transition-delay: 100ms;
    }

    .content {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Hint bar ──────────────────────────────────────────────────────────── */
    .hint {
      background: #e8f0fe;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 11.5px;
      color: #1a56c4;
      line-height: 1.5;
    }
    .hint code {
      background: #c7d9f9;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace;
      font-size: 11px;
    }

    /* ── Section label ─────────────────────────────────────────────────────── */
    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #5f6368;
      padding: 2px 2px 4px;
    }

    /* ── Tag cards ─────────────────────────────────────────────────────────── */
    .tag-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .tag-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .tag-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      cursor: pointer;
      user-select: none;
    }
    .tag-card-header:hover { background: #f8f9fa; }


    .tag-card-name {
      font-weight: 500;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      font-size: 10.5px;
      font-weight: 600;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .badge-warn {
      background: #fef3cd;
      color: #b36b00;
    }

    .chevron {
      font-size: 14px;
      color: #80868b;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── Card body (expanded) ──────────────────────────────────────────────── */
    .tag-card-body {
      display: none;
      border-top: 1px solid #e0e0e0;
      padding: 10px 11px;
    }
    .tag-card-body.open { display: block; }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Defined-but-not-in-doc list ───────────────────────────────────────── */
    .ghost-tag {
      display: inline-flex;
      padding: 3px 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      font-size: 12px;
      color: #5f6368;
    }

    /* ── Buttons ────────────────────────────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-primary:not(:disabled):hover   { background: #1558b0; }
    .btn-secondary { background: #e8f0fe; color: #1a73e8; }
    .btn-secondary:not(:disabled):hover { background: #d2e3fc; }
    .btn-success   { background: #e6f4ea; color: #137333; }
    .btn-success:not(:disabled):hover   { background: #ceead6; }
    .btn-danger    { background: #fce8e6; color: #d93025; }
    .btn-danger:not(:disabled):hover    { background: #f5c6c3; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Create form ────────────────────────────────────────────────────────── */
    .create-card {
      background: #fff;
      border: 1px solid #1a73e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .create-card-header {
      background: #e8f0fe;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #1a73e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .create-card-body { padding: 10px 12px; }

    .form-group { margin-bottom: 9px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #202124;
    }
    input:focus { outline: none; border-color: #1a73e8; }


    .form-row { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; }

    /* ── Status messages ────────────────────────────────────────────────────── */
    .status {
      font-size: 11.5px;
      padding: 5px 8px;
      border-radius: 5px;
      margin-top: 7px;
      display: none;
    }
    .status.show    { display: block; }
    .status.info    { background: #e8f0fe; color: #1a73e8; }
    .status.success { background: #e6f4ea; color: #137333; }
    .status.error   { background: #fce8e6; color: #d93025; }

    /* ── Empty state ────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: #80868b;
      font-size: 12px;
      padding: 16px 10px;
      line-height: 1.6;
    }

    /* ── Loading ────────────────────────────────────────────────────────────── */
    .loading { color: #80868b; font-size: 12px; padding: 12px 4px; }

    /* ── Settings tabs ──────────────────────────────────────────────────────── */
    .settings-tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 12px;
    }
    .settings-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #5f6368;
      cursor: pointer;
    }
    .settings-tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .settings-tab:hover:not(.active) { color: #3c4043; background: #f1f3f4; }

    /* ── Settings form ──────────────────────────────────────────────────────── */
    .settings-field { margin-bottom: 12px; }
    .settings-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 4px;
    }
    .settings-field input[type="number"],
    .settings-field select {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }
    .settings-field input[type="number"]:focus,
    .settings-field select:focus { outline: none; border-color: #1a73e8; }
    .settings-color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-color-row input[type="color"] {
      width: 36px;
      height: 32px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .settings-color-row input[type="text"] {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #202124;
      font-family: monospace;
    }
    .settings-color-row input[type="text"]:focus,
    .settings-color-row input[type="color"]:focus { outline: none; border-color: #1a73e8; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <!-- Main mode -->
  <div id="hdr-main" style="display:flex;align-items:center;width:100%;gap:5px;">
    <button class="header-btn" id="btn-sync-refresh" onclick="syncAndRefresh()" data-tooltip="Sync" style="flex-shrink:0;">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <span class="header-status" id="header-status" style="flex:1;padding:0 6px;"></span>
    <button class="header-btn" onclick="openSettings()" data-tooltip="Settings" style="flex-shrink:0;">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <!-- Settings mode -->
  <div id="hdr-settings" style="display:none;align-items:center;width:100%;gap:8px;">
    <button class="header-btn" onclick="closeSettings()">&#8592;</button>
    <span style="font-size:13px;font-weight:500;">Settings</span>
  </div>
</div>

<div class="content" id="main-content">

  <!-- ── Top-level error banner ────────────────────────────────────────────── -->
  <div id="status-top" class="status"></div>

  <!-- ── Initial loader (first open only) ──────────────────────────────────── -->
  <div id="initial-loader" class="loading" style="padding:20px 4px;text-align:center;">Loading…</div>

  <!-- ── Tags found in document ─────────────────────────────────────────────── -->
  <div id="in-doc-section" style="display:none;">
    <div class="section-label">Tags in this doc</div>
    <div id="in-doc-list"></div>
  </div>

  <!-- ── New tag button ─────────────────────────────────────────────────────── -->
  <button class="btn btn-secondary btn-full" onclick="toggleCreateForm()" id="btn-new-tag">
    + Create New Tag
  </button>

  <!-- ── Create / link tag form ─────────────────────────────────────────────── -->
  <div class="create-card" id="create-form" style="display:none;">
    <div class="create-card-header">
      Link Tag to Aggregation Doc
      <button onclick="toggleCreateForm()" style="background:none;border:none;cursor:pointer;color:#1a73e8;font-size:15px;line-height:1;">✕</button>
    </div>
    <div class="create-card-body">
      <div class="form-group">
        <label for="new-tag-name">Tag Name</label>
        <input type="text" id="new-tag-name" placeholder='Must match [tag] in document'>
      </div>
      <div class="form-group">
        <label for="new-agg-url">Aggregation Document URL</label>
        <input type="url" id="new-agg-url" placeholder="Paste Google Docs URL">
      </div>
      <div class="form-row">
        <button class="btn btn-secondary" onclick="toggleCreateForm()">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateTag()">Link Tag</button>
      </div>
      <div id="status-create" class="status"></div>
    </div>
  </div>

  <!-- ── Defined tags not in document ──────────────────────────────────────── -->
  <div id="not-in-doc-section" style="display:none">
    <div class="section-label">Unused tags</div>
    <div id="not-in-doc-list" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
  </div>

  <!-- ── Usage hint ─────────────────────────────────────────────────────────── -->
  <div class="hint">
    Write <code>[Tag Name]</code> as a list item. Child items will be synced to the aggregation doc.
    <ul style="margin-top:8px;padding-left:16px;line-height:1.8;list-style:disc;">
      <li><code>[Tag Name]</code>
        <ul style="padding-left:16px;list-style:disc;">
          <li>synced text</li>
          <li>synced text
            <ul style="padding-left:16px;list-style:circle;">
              <li>synced text</li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>
  </div>

</div><!-- /#main-content -->

<!-- ── Settings pane ────────────────────────────────────────────────────────── -->
<div id="settings-content" class="content" style="display:none;">

  <div class="settings-tabs">
    <button class="settings-tab active" data-tab="manage-tags" onclick="switchSettingsTab('manage-tags')">Manage Tags</button>
    <button class="settings-tab" data-tab="timestamp" onclick="switchSettingsTab('timestamp')">Timestamp Settings</button>
  </div>

  <!-- Manage Tags tab -->
  <div id="tab-manage-tags" class="tab-panel" style="display:flex;flex-direction:column;gap:10px;">

    <button class="btn btn-secondary btn-full" onclick="toggleSettingsCreateForm()">
      + Create New Tag
    </button>

    <div class="create-card" id="settings-create-form" style="display:none;">
      <div class="create-card-header">
        Link Tag to Aggregation Doc
        <button onclick="toggleSettingsCreateForm()" style="background:none;border:none;cursor:pointer;color:#1a73e8;font-size:15px;line-height:1;">✕</button>
      </div>
      <div class="create-card-body">
        <div class="form-group">
          <label for="settings-new-tag-name">Tag Name</label>
          <input type="text" id="settings-new-tag-name" placeholder='Must match [tag] in document'>
        </div>
        <div class="form-group">
          <label for="settings-new-agg-url">Aggregation Document URL</label>
          <input type="url" id="settings-new-agg-url" placeholder="Paste Google Docs URL">
        </div>
        <div class="form-row">
          <button class="btn btn-secondary" onclick="toggleSettingsCreateForm()">Cancel</button>
          <button class="btn btn-primary" onclick="submitSettingsCreateTag()">Link Tag</button>
        </div>
        <div id="status-settings-create" class="status"></div>
      </div>
    </div>

    <div id="manage-tags-list"><div class="loading">Loading…</div></div>
  </div>

  <!-- Timestamp Settings tab -->
  <div id="tab-timestamp" class="tab-panel" style="display:none;">
    <div class="settings-field">
      <label for="ts-font-size">Font Size (pt)</label>
      <input type="number" id="ts-font-size" min="6" max="24" value="11">
    </div>
    <div class="settings-field">
      <label for="ts-parent-folders">Parent Folders in Link</label>
      <select id="ts-parent-folders">
        <option value="0">0 — filename only</option>
        <option value="1">1 — parent / filename</option>
        <option value="2" selected>2 — grandparent / parent / filename</option>
      </select>
    </div>
    <div class="settings-field">
      <label>Link Color</label>
      <div class="settings-color-row">
        <input type="color" id="ts-link-color-picker" value="#1155CC">
        <input type="text"  id="ts-link-color-text"   value="#1155CC" maxlength="7" placeholder="#rrggbb">
      </div>
    </div>
    <div class="settings-field">
      <label>Text Color</label>
      <div class="settings-color-row">
        <input type="color" id="ts-text-color-picker" value="#777777">
        <input type="text"  id="ts-text-color-text"   value="#777777" maxlength="7" placeholder="#rrggbb">
      </div>
    </div>
    <div class="settings-field">
      <label for="ts-date-format">Date / Time Format</label>
      <select id="ts-date-format">
        <option value="locale">Default  (e.g. 4/24/2026 3:45:00 PM)</option>
        <option value="short">Short  (e.g. 4/24/2026 3:45 PM)</option>
        <option value="date-only">Date only  (e.g. 4/24/2026)</option>
        <option value="iso">ISO  (e.g. 2026-04-24 15:45)</option>
      </select>
    </div>
    <div class="form-row" style="margin-top:4px;">
      <button class="btn btn-primary btn-full" onclick="saveTimestampSettingsForm()">Save Settings</button>
    </div>
    <div id="status-ts" class="status" style="margin-top:8px;"></div>
  </div>

</div><!-- /#settings-content -->

<script>
  // ── State ────────────────────────────────────────────────────────────────────

  // Currently open card name.
  let openCard = null;
  let initialLoad = true;

  // ── Init ─────────────────────────────────────────────────────────────────────

  window.onload = function () {
    syncAndRefresh();
  };

  // ── Load & render ─────────────────────────────────────────────────────────────

  function loadSummary() {
    setHeaderLoading(true);
    setHeaderStatus('Scanning document…');

    google.script.run
      .withSuccessHandler(function (summary) {
        setHeaderLoading(false);
        setHeaderStatus('');
        renderSummary(summary);
      })
      .withFailureHandler(function (err) {
        setHeaderLoading(false);
        setHeaderStatus('');
        revealDocSection();
        document.getElementById('in-doc-list').innerHTML =
          '<div class="status error show">' + esc(err.message) + '</div>';
      })
      .getDocumentTagSummary();
  }

  function syncAndRefresh() {
    setHeaderLoading(true);
    setHeaderStatus('Scanning document…');

    google.script.run
      .withSuccessHandler(function (summary) {
        renderSummary(summary);
        setHeaderStatus('Syncing…');

        google.script.run
          .withSuccessHandler(function (res) {
            setHeaderLoading(false);
            const errCount = Object.keys(res.errors).length;
            if (errCount > 0) {
              setHeaderStatus('');
              showStatus('status-top', Object.values(res.errors).join('\n'), 'error');
            } else {
              const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              setHeaderStatus('Synced at ' + time);
            }
          })
          .withFailureHandler(function (err) {
            setHeaderLoading(false);
            setHeaderStatus('');
            showStatus('status-top', err.message, 'error');
          })
          .syncAllTags(Intl.DateTimeFormat().resolvedOptions().timeZone);
      })
      .withFailureHandler(function (err) {
        setHeaderLoading(false);
        setHeaderStatus('');
        revealDocSection();
        document.getElementById('in-doc-list').innerHTML =
          '<div class="status error show">' + esc(err.message) + '</div>';
      })
      .getDocumentTagSummary();
  }

  function renderSummary(summary) {
    setHeaderLoading(false);
    setHeaderStatus('');
    revealDocSection();

    // ── In-document tags ──
    const inDocEl = document.getElementById('in-doc-list');
    if (!summary.inDocument || summary.inDocument.length === 0) {
      inDocEl.innerHTML =
        '<div class="empty-state">No <code>[tags]</code> found in this document.<br>' +
        'Add a list item like <strong>[My Tag]</strong> then indent content under it.</div>';
    } else {
      inDocEl.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
      summary.inDocument.forEach(function (item) {
        wrap.appendChild(buildTagCard(item));
      });
      inDocEl.appendChild(wrap);
    }

    // ── Not-in-doc defined tags ──
    const notInDocSection = document.getElementById('not-in-doc-section');
    const notInDocList   = document.getElementById('not-in-doc-list');
    if (summary.notInDocument && summary.notInDocument.length > 0) {
      notInDocSection.style.display = 'block';
      notInDocList.innerHTML = '';
      summary.notInDocument
        .slice().sort(function (a, b) { return a.name.localeCompare(b.name); })
        .forEach(function (tag) { notInDocList.appendChild(buildGhostTag(tag)); });
    } else {
      notInDocSection.style.display = 'none';
    }
  }

  // ── Shared: aggregation doc section (linked view + edit view) ────────────────

  /**
   * Builds the aggregation doc sub-section used inside both buildTagCard and
   * buildManageTagCard. Shows the linked doc as a named link with an X to switch
   * to an edit view, or shows the edit view directly when unlinked.
   */
  function buildAggDocSection(tagName, aggDocId, aggDocName, isLinked) {
    const wrap = document.createElement('div');

    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;font-weight:600;color:#5f6368;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;';
    label.textContent = 'Aggregation Doc';
    wrap.appendChild(label);

    // Linked view: named link + X button
    const linkedView = document.createElement('div');
    linkedView.style.cssText = 'display:' + (isLinked ? 'flex' : 'none') + ';align-items:center;gap:6px;';

    const docLink = document.createElement('a');
    docLink.style.cssText = 'font-size:12px;color:#1a73e8;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    docLink.target = '_blank';
    if (aggDocId) {
      docLink.href = 'https://docs.google.com/document/d/' + aggDocId + '/edit';
      docLink.textContent = aggDocName || aggDocId;
    }

    const xBtn = document.createElement('button');
    xBtn.style.cssText = 'background:none;border:none;color:#bbb;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;';
    xBtn.textContent = '✕';
    xBtn.title = 'Change aggregation doc';
    xBtn.onmouseenter = function () { this.style.color = '#d93025'; };
    xBtn.onmouseleave = function () { this.style.color = '#bbb'; };
    xBtn.onclick = function (e) {
      e.stopPropagation();
      linkedView.style.display = 'none';
      editView.style.display = 'block';
    };

    linkedView.appendChild(docLink);
    linkedView.appendChild(xBtn);

    // Edit view: URL input + Save button
    const editView = document.createElement('div');
    editView.style.display = isLinked ? 'none' : 'block';

    const urlInput = document.createElement('input');
    urlInput.type = 'url';
    urlInput.placeholder = 'Paste Google Docs URL';
    urlInput.style.cssText = 'width:100%;border:1px solid #dadce0;border-radius:6px;padding:6px 10px;font-size:13px;margin-bottom:8px;box-sizing:border-box;';
    if (aggDocId) {
      urlInput.value = 'https://docs.google.com/document/d/' + aggDocId + '/edit';
    }
    editView.appendChild(urlInput);

    const statusEl = document.createElement('div');
    statusEl.className = 'status';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.style.cssText = 'width:100%;justify-content:center;';
    saveBtn.textContent = isLinked ? 'Save' : 'Link Tag';
    saveBtn.onclick = function () {
      const url = urlInput.value.trim();
      if (!url) { showEl(statusEl, 'Enter an aggregation doc URL.', 'error'); return; }
      showEl(statusEl, 'Saving…', 'info');
      saveBtn.disabled = true;
      google.script.run
        .withSuccessHandler(function (result) {
          saveBtn.disabled = false;
          statusEl.className = 'status';
          docLink.href = 'https://docs.google.com/document/d/' + result.aggregationDocId + '/edit';
          docLink.textContent = result.aggregationDocName || result.aggregationDocId;
          linkedView.style.display = 'flex';
          editView.style.display = 'none';
        })
        .withFailureHandler(function (err) {
          saveBtn.disabled = false;
          showEl(statusEl, err.message, 'error');
        })
        .createTag(tagName, url);
    };

    editView.appendChild(saveBtn);
    editView.appendChild(statusEl);

    wrap.appendChild(linkedView);
    wrap.appendChild(editView);
    wrap.showEditView = function () {
      linkedView.style.display = 'none';
      editView.style.display = 'block';
    };
    return wrap;
  }

  // ── Tag card builder ──────────────────────────────────────────────────────────

  function buildTagCard(item) {
    const card = document.createElement('div');
    card.className = 'tag-card';
    card.dataset.tagName = item.name;

    // ── Header ──
    const header = document.createElement('div');
    header.className = 'tag-card-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'tag-card-name';
    nameEl.textContent = item.name;

    const badge = document.createElement('span');
    badge.className = 'badge' + (item.defined ? '' : ' badge-warn');
    badge.textContent = item.excerpts.length + ' lines';
    badge.title = item.excerpts.length + ' excerpt' + (item.excerpts.length === 1 ? '' : 's');

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '›';

    header.appendChild(nameEl);
    if (!item.defined) {
      const warn = document.createElement('span');
      warn.style.cssText = 'font-size:11px;color:#b36b00;';
      warn.textContent = 'not linked';
      header.appendChild(warn);
    }
    header.appendChild(badge);
    header.appendChild(chevron);

    // ── Body ──
    const body = document.createElement('div');
    body.className = 'tag-card-body';

    body.appendChild(buildAggDocSection(item.name, item.aggregationDocId, item.aggregationDocName, item.defined));

    // Restore open state across refreshes.
    if (openCard === item.name) {
      body.classList.add('open');
      chevron.classList.add('open');
    }

    header.onclick = function () {
      const isOpen = body.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
      openCard = isOpen ? item.name : null;
    };

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  // ── Ghost tag (defined but not in doc) ───────────────────────────────────────

  function buildGhostTag(tag) {
    const el = document.createElement('div');
    el.className = 'ghost-tag';
    el.textContent = tag.name;
    return el;
  }

  // ── Sync ──────────────────────────────────────────────────────────────────────

  // ── Delete tag ────────────────────────────────────────────────────────────────

  function deleteTag(tagId) {
    google.script.run
      .withSuccessHandler(function () { loadSummary(); })
      .withFailureHandler(function (err) {
        showStatus('status-top', err.message, 'error');
      })
      .deleteTag(tagId);
  }

  // ── Create form ───────────────────────────────────────────────────────────────

  function toggleCreateForm(prefillName) {
    const form = document.getElementById('create-form');
    const visible = form.style.display !== 'none';
    form.style.display = visible ? 'none' : 'block';
    if (!visible) {
      document.getElementById('new-tag-name').value = prefillName || '';
      document.getElementById('new-agg-url').value = '';
      clearStatus('status-create');
    }
  }

  function submitCreateTag() {
    const name = document.getElementById('new-tag-name').value.trim();
    const url  = document.getElementById('new-agg-url').value.trim();

    if (!name) { showStatus('status-create', 'Enter a tag name.', 'error'); return; }
    if (!url)  { showStatus('status-create', 'Enter an aggregation doc URL.', 'error'); return; }

    showStatus('status-create', 'Linking…', 'info');

    google.script.run
      .withSuccessHandler(function (result) {
        showStatus('status-create', '✓ Tag "' + result.name + '" linked!', 'success');
        setTimeout(function () {
          toggleCreateForm();
          loadSummary();
        }, 700);
      })
      .withFailureHandler(function (err) {
        showStatus('status-create', err.message, 'error');
      })
      .createTag(name, url);
  }

  // ── Utilities ─────────────────────────────────────────────────────────────────

  function revealDocSection() {
    if (initialLoad) {
      initialLoad = false;
      document.getElementById('initial-loader').style.display = 'none';
      document.getElementById('in-doc-section').style.display = 'block';
    }
  }

  function setHeaderLoading(on) {
    document.getElementById('btn-sync-refresh').disabled = on;
  }

  function setHeaderStatus(msg) {
    document.getElementById('header-status').textContent = msg;
  }

  function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status ' + type + ' show';
  }

  function showEl(el, msg, type) {
    el.textContent = msg;
    el.className = 'status ' + type + ' show';
  }

  function clearStatus(id) {
    const el = document.getElementById(id);
    if (el) { el.className = 'status'; el.textContent = ''; }
  }

  // ── Settings navigation ───────────────────────────────────────────────────────

  function openSettings() {
    document.getElementById('hdr-main').style.display = 'none';
    document.getElementById('hdr-settings').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('settings-content').style.display = 'block';
    loadManageTags();
    loadTimestampSettings();
  }

  function closeSettings() {
    document.getElementById('hdr-settings').style.display = 'none';
    document.getElementById('hdr-main').style.display = 'flex';
    document.getElementById('settings-content').style.display = 'none';
    document.getElementById('main-content').style.display = '';
  }

  function switchSettingsTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(function (p) { p.style.display = 'none'; });
    document.getElementById('tab-' + tab).style.display = tab === 'manage-tags' ? 'flex' : 'block';
    document.querySelectorAll('.settings-tab').forEach(function (t) {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
  }

  // ── Manage Tags tab ───────────────────────────────────────────────────────────

  function loadManageTags() {
    document.getElementById('manage-tags-list').innerHTML = '<div class="loading">Loading…</div>';
    google.script.run
      .withSuccessHandler(renderManageTags)
      .withFailureHandler(function (err) {
        document.getElementById('manage-tags-list').innerHTML =
          '<div class="status error show">' + esc(err.message) + '</div>';
      })
      .getTags();
  }

  function renderManageTags(tagsMap) {
    const list = document.getElementById('manage-tags-list');
    const entries = Object.entries(tagsMap).sort(function (a, b) {
      return a[1].name.localeCompare(b[1].name);
    });
    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state">No tags defined yet.</div>';
      return;
    }
    list.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    entries.forEach(function (entry) {
      wrap.appendChild(buildManageTagCard(entry[0], entry[1]));
    });
    list.appendChild(wrap);
  }

  function toggleSettingsCreateForm() {
    const form = document.getElementById('settings-create-form');
    const visible = form.style.display !== 'none';
    form.style.display = visible ? 'none' : 'block';
    if (!visible) {
      document.getElementById('settings-new-tag-name').value = '';
      document.getElementById('settings-new-agg-url').value = '';
      clearStatus('status-settings-create');
    }
  }

  function submitSettingsCreateTag() {
    const name = document.getElementById('settings-new-tag-name').value.trim();
    const url  = document.getElementById('settings-new-agg-url').value.trim();

    if (!name) { showStatus('status-settings-create', 'Enter a tag name.', 'error'); return; }
    if (!url)  { showStatus('status-settings-create', 'Enter an aggregation doc URL.', 'error'); return; }

    showStatus('status-settings-create', 'Linking…', 'info');

    google.script.run
      .withSuccessHandler(function (result) {
        showStatus('status-settings-create', '✓ Tag "' + result.name + '" linked!', 'success');
        setTimeout(function () {
          toggleSettingsCreateForm();
          loadManageTags();
        }, 700);
      })
      .withFailureHandler(function (err) {
        showStatus('status-settings-create', err.message, 'error');
      })
      .createTag(name, url);
  }

  function buildManageTagCard(tagId, tag) {
    const card = document.createElement('div');
    card.className = 'tag-card';

    // Header
    const header = document.createElement('div');
    header.className = 'tag-card-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'tag-card-name';
    nameEl.textContent = tag.name;

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '›';

    header.appendChild(nameEl);
    header.appendChild(chevron);

    // Body
    const body = document.createElement('div');
    body.className = 'tag-card-body';

    const aggDocSection = buildAggDocSection(tag.name, tag.aggregationDocId, tag.aggregationDocName, !!tag.aggregationDocId);
    body.appendChild(aggDocSection);

    // Action buttons row
    const delStatusEl = document.createElement('div');
    delStatusEl.className = 'status';

    const actionsRow = document.createElement('div');
    actionsRow.className = 'card-actions';

    const changeLinkBtn = document.createElement('button');
    changeLinkBtn.className = 'btn btn-secondary';
    changeLinkBtn.textContent = 'Change Link';
    changeLinkBtn.onclick = function (e) {
      e.stopPropagation();
      aggDocSection.showEditView();
    };

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete Tag';
    delBtn.onclick = function (e) {
      e.stopPropagation();
      if (!confirm('Delete the "' + tag.name + '" tag definition?\n\nThis only removes the aggregation doc association. Your [' + tag.name + '] list items stay intact.')) return;
      delBtn.disabled = true;
      showEl(delStatusEl, 'Deleting…', 'info');
      google.script.run
        .withSuccessHandler(function () { card.remove(); })
        .withFailureHandler(function (err) {
          delBtn.disabled = false;
          showEl(delStatusEl, err.message, 'error');
        })
        .deleteTag(tagId);
    };

    actionsRow.appendChild(changeLinkBtn);
    actionsRow.appendChild(delBtn);
    body.appendChild(actionsRow);
    body.appendChild(delStatusEl);

    // Toggle
    header.onclick = function () {
      const isOpen = body.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
    };

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  // ── Timestamp Settings tab ────────────────────────────────────────────────────

  function loadTimestampSettings() {
    google.script.run
      .withSuccessHandler(function (s) {
        document.getElementById('ts-font-size').value = s.fontSize;
        document.getElementById('ts-parent-folders').value = String(s.parentFolders);
        document.getElementById('ts-link-color-picker').value = s.linkColor;
        document.getElementById('ts-link-color-text').value = s.linkColor;
        document.getElementById('ts-text-color-picker').value = s.textColor;
        document.getElementById('ts-text-color-text').value = s.textColor;
        document.getElementById('ts-date-format').value = s.dateFormat;
      })
      .withFailureHandler(function (err) {
        showStatus('status-ts', err.message, 'error');
      })
      .getTimestampSettings();

    // Keep color picker and text input in sync
    syncColorPair('ts-link-color-picker', 'ts-link-color-text');
    syncColorPair('ts-text-color-picker', 'ts-text-color-text');
  }

  function syncColorPair(pickerId, textId) {
    const picker = document.getElementById(pickerId);
    const text   = document.getElementById(textId);
    picker.addEventListener('input', function () { text.value = picker.value; });
    text.addEventListener('input', function () {
      if (/^#[0-9a-fA-F]{6}$/.test(text.value)) picker.value = text.value;
    });
  }

  function saveTimestampSettingsForm() {
    const settings = {
      fontSize:      parseInt(document.getElementById('ts-font-size').value, 10),
      parentFolders: parseInt(document.getElementById('ts-parent-folders').value, 10),
      linkColor:     document.getElementById('ts-link-color-text').value.trim(),
      textColor:     document.getElementById('ts-text-color-text').value.trim(),
      dateFormat:    document.getElementById('ts-date-format').value,
    };
    if (!settings.fontSize || settings.fontSize < 1) {
      showStatus('status-ts', 'Font size must be a positive number.', 'error'); return;
    }
    showStatus('status-ts', 'Saving…', 'info');
    google.script.run
      .withSuccessHandler(function () { showStatus('status-ts', '✓ Settings saved.', 'success'); })
      .withFailureHandler(function (err) { showStatus('status-ts', err.message, 'error'); })
      .saveTimestampSettings(settings);
  }

  function esc(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
</script>
