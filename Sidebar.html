<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #f8f9fa;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 500; }
    .header-right { display: flex; gap: 5px; }
    .header-status {
      font-size: 11px;
      color: rgba(255,255,255,.8);
      font-style: italic;
      white-space: nowrap;
    }
    .header-btn {
      background: rgba(255,255,255,.18);
      border: none;
      border-radius: 5px;
      color: #fff;
      padding: 4px 9px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .header-btn:hover { background: rgba(255,255,255,.3); }
    .header-btn:disabled { opacity: .5; cursor: default; }

    .content {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Hint bar ──────────────────────────────────────────────────────────── */
    .hint {
      background: #e8f0fe;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 11.5px;
      color: #1a56c4;
      line-height: 1.5;
    }
    .hint code {
      background: #c7d9f9;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace;
      font-size: 11px;
    }

    /* ── Section label ─────────────────────────────────────────────────────── */
    .section-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #5f6368;
      padding: 2px 2px 4px;
    }

    /* ── Tag cards ─────────────────────────────────────────────────────────── */
    .tag-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .tag-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .tag-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      cursor: pointer;
      user-select: none;
    }
    .tag-card-header:hover { background: #f8f9fa; }


    .tag-card-name {
      font-weight: 500;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      font-size: 10.5px;
      font-weight: 600;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }
    .badge-warn {
      background: #fef3cd;
      color: #b36b00;
    }

    .chevron {
      font-size: 14px;
      color: #80868b;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .chevron.open { transform: rotate(90deg); }

    /* ── Card body (expanded) ──────────────────────────────────────────────── */
    .tag-card-body {
      display: none;
      border-top: 1px solid #e0e0e0;
      padding: 10px 11px;
    }
    .tag-card-body.open { display: block; }

    .excerpt-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }
    .excerpt-item {
      font-size: 12px;
      line-height: 1.5;
      padding: 5px 8px;
      border-radius: 5px;
      border-left: 3px solid #ccc;
      background: #f8f9fa;
      word-break: break-word;
    }
    .no-excerpts {
      font-size: 12px;
      color: #80868b;
      font-style: italic;
      padding: 3px 0 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Defined-but-not-in-doc list ───────────────────────────────────────── */
    .ghost-tag {
      display: inline-flex;
      padding: 3px 8px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      font-size: 12px;
      color: #5f6368;
    }

    /* ── Buttons ────────────────────────────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-primary:not(:disabled):hover   { background: #1558b0; }
    .btn-secondary { background: #e8f0fe; color: #1a73e8; }
    .btn-secondary:not(:disabled):hover { background: #d2e3fc; }
    .btn-success   { background: #e6f4ea; color: #137333; }
    .btn-success:not(:disabled):hover   { background: #ceead6; }
    .btn-danger    { background: #fce8e6; color: #d93025; }
    .btn-danger:not(:disabled):hover    { background: #f5c6c3; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Create form ────────────────────────────────────────────────────────── */
    .create-card {
      background: #fff;
      border: 1px solid #1a73e8;
      border-radius: 8px;
      overflow: hidden;
    }
    .create-card-header {
      background: #e8f0fe;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #1a73e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .create-card-body { padding: 10px 12px; }

    .form-group { margin-bottom: 9px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 4px;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #202124;
    }
    input:focus { outline: none; border-color: #1a73e8; }


    .form-row { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; }

    /* ── Status messages ────────────────────────────────────────────────────── */
    .status {
      font-size: 11.5px;
      padding: 5px 8px;
      border-radius: 5px;
      margin-top: 7px;
      display: none;
    }
    .status.show    { display: block; }
    .status.info    { background: #e8f0fe; color: #1a73e8; }
    .status.success { background: #e6f4ea; color: #137333; }
    .status.error   { background: #fce8e6; color: #d93025; }

    /* ── Empty state ────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: #80868b;
      font-size: 12px;
      padding: 16px 10px;
      line-height: 1.6;
    }

    /* ── Loading ────────────────────────────────────────────────────────────── */
    .loading { color: #80868b; font-size: 12px; padding: 12px 4px; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-right">
    <button class="header-btn" onclick="loadSummary()" id="btn-refresh" title="Rescan document">
      Refresh
    </button>
    <button class="header-btn" onclick="syncAll()" id="btn-sync-all" title="Sync all linked tags">
      Sync
    </button>
  </div>
  <span class="header-status" id="header-status"></span>
</div>

<div class="content">

  <!-- ── Top-level error banner ────────────────────────────────────────────── -->
  <div id="status-top" class="status"></div>

  <!-- ── Initial loader (first open only) ──────────────────────────────────── -->
  <div id="initial-loader" class="loading" style="padding:20px 4px;text-align:center;">Loading…</div>

  <!-- ── Tags found in document ─────────────────────────────────────────────── -->
  <div id="in-doc-section" style="display:none;">
    <div class="section-label">Tags in this doc</div>
    <div id="in-doc-list"></div>
  </div>

  <!-- ── New tag button ─────────────────────────────────────────────────────── -->
  <button class="btn btn-secondary btn-full" onclick="toggleCreateForm()" id="btn-new-tag">
    + Create New Tag
  </button>

  <!-- ── Create / link tag form ─────────────────────────────────────────────── -->
  <div class="create-card" id="create-form" style="display:none;">
    <div class="create-card-header">
      Link Tag to Aggregation Doc
      <button onclick="toggleCreateForm()" style="background:none;border:none;cursor:pointer;color:#1a73e8;font-size:15px;line-height:1;">✕</button>
    </div>
    <div class="create-card-body">
      <div class="form-group">
        <label for="new-tag-name">Tag Name</label>
        <input type="text" id="new-tag-name" placeholder='Must match [tag] in document'>
      </div>
      <div class="form-group">
        <label for="new-agg-url">Aggregation Document URL</label>
        <input type="url" id="new-agg-url" placeholder="Paste Google Docs URL">
      </div>
      <div class="form-row">
        <button class="btn btn-secondary" onclick="toggleCreateForm()">Cancel</button>
        <button class="btn btn-primary" onclick="submitCreateTag()">Link Tag</button>
      </div>
      <div id="status-create" class="status"></div>
    </div>
  </div>

  <!-- ── Defined tags not in document ──────────────────────────────────────── -->
  <div id="not-in-doc-section" style="display:none">
    <div class="section-label">Unused tags</div>
    <div id="not-in-doc-list" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
  </div>

  <!-- ── Usage hint ─────────────────────────────────────────────────────────── -->
  <div class="hint">
    Write <code>[Tag Name]</code> as a list item. Child items will be synced to aggregation doc.
    <ul style="margin-top:8px;padding-left:16px;line-height:1.8;list-style:disc;">
      <li><code>[Tag Name]</code>
        <ul style="padding-left:16px;list-style:disc;">
          <li>synced text</li>
          <li>synced text
            <ul style="padding-left:16px;list-style:circle;">
              <li>synced text</li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>
  </div>

</div><!-- /.content -->

<script>
  // ── State ────────────────────────────────────────────────────────────────────

  // Currently open card name.
  let openCard = null;
  let initialLoad = true;

  // ── Init ─────────────────────────────────────────────────────────────────────

  window.onload = function () {
    loadSummary();
  };

  // ── Load & render ─────────────────────────────────────────────────────────────

  function loadSummary() {
    setHeaderLoading(true);
    setHeaderStatus('Scanning document…');

    google.script.run
      .withSuccessHandler(renderSummary)
      .withFailureHandler(function (err) {
        setHeaderLoading(false);
        setHeaderStatus('');
        revealDocSection();
        document.getElementById('in-doc-list').innerHTML =
          '<div class="status error show">' + esc(err.message) + '</div>';
      })
      .getDocumentTagSummary();
  }

  function renderSummary(summary) {
    setHeaderLoading(false);
    setHeaderStatus('');
    revealDocSection();

    // ── In-document tags ──
    const inDocEl = document.getElementById('in-doc-list');
    if (!summary.inDocument || summary.inDocument.length === 0) {
      inDocEl.innerHTML =
        '<div class="empty-state">No <code>[tags]</code> found in this document.<br>' +
        'Add a list item like <strong>[My Tag]</strong> then indent content under it.</div>';
    } else {
      inDocEl.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
      summary.inDocument.forEach(function (item) {
        wrap.appendChild(buildTagCard(item));
      });
      inDocEl.appendChild(wrap);
      // Re-open the previously open card.
      if (openCard) {
        const el = document.querySelector('[data-tag-name="' + CSS.escape(openCard) + '"]');
        if (el) el.classList.add('open-init');
      }
    }

    // ── Not-in-doc defined tags ──
    const notInDocSection = document.getElementById('not-in-doc-section');
    const notInDocList   = document.getElementById('not-in-doc-list');
    if (summary.notInDocument && summary.notInDocument.length > 0) {
      notInDocSection.style.display = 'block';
      notInDocList.innerHTML = '';
      summary.notInDocument
        .slice().sort(function (a, b) { return a.name.localeCompare(b.name); })
        .forEach(function (tag) { notInDocList.appendChild(buildGhostTag(tag)); });
    } else {
      notInDocSection.style.display = 'none';
    }
  }

  // ── Tag card builder ──────────────────────────────────────────────────────────

  function buildTagCard(item) {
    const card = document.createElement('div');
    card.className = 'tag-card';
    card.dataset.tagName = item.name;

    // ── Header ──
    const header = document.createElement('div');
    header.className = 'tag-card-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'tag-card-name';
    nameEl.textContent = item.name;

    const badge = document.createElement('span');
    badge.className = 'badge' + (item.defined ? '' : ' badge-warn');
    badge.textContent = item.excerpts.length + ' lines';
    badge.title = item.excerpts.length + ' excerpt' + (item.excerpts.length === 1 ? '' : 's');

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '›';

    header.appendChild(nameEl);
    if (!item.defined) {
      const warn = document.createElement('span');
      warn.style.cssText = 'font-size:11px;color:#b36b00;';
      warn.textContent = 'not linked';
      header.appendChild(warn);
    }
    header.appendChild(badge);
    header.appendChild(chevron);

    // ── Body ──
    const body = document.createElement('div');
    body.className = 'tag-card-body';

    // Aggregation doc section.
    const aggLabel = document.createElement('div');
    aggLabel.style.cssText = 'font-size:11px;font-weight:600;color:#5f6368;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;';
    aggLabel.textContent = 'Aggregation Doc';
    body.appendChild(aggLabel);

    const isLinked = item.defined && item.aggregationDocId;

    // --- Linked view: named link + X ---
    const linkedView = document.createElement('div');
    linkedView.style.cssText = 'display:' + (isLinked ? 'flex' : 'none') + ';align-items:center;gap:6px;';

    const docLink = document.createElement('a');
    docLink.style.cssText = 'font-size:12px;color:#1a73e8;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    docLink.target = '_blank';
    if (item.aggregationDocId) {
      docLink.href = 'https://docs.google.com/document/d/' + item.aggregationDocId + '/edit';
      docLink.textContent = item.aggregationDocName || item.aggregationDocId;
    }

    const removeBtn = document.createElement('button');
    removeBtn.style.cssText = 'background:none;border:none;color:#bbb;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;';
    removeBtn.textContent = '✕';
    removeBtn.title = 'Change aggregation doc';
    removeBtn.onmouseenter = function () { this.style.color = '#d93025'; };
    removeBtn.onmouseleave = function () { this.style.color = '#bbb'; };

    linkedView.appendChild(docLink);
    linkedView.appendChild(removeBtn);

    // --- Edit view: URL input + Save ---
    const editView = document.createElement('div');
    editView.style.display = isLinked ? 'none' : 'block';

    const urlInput = document.createElement('input');
    urlInput.type = 'url';
    urlInput.placeholder = 'Paste Google Docs URL';
    urlInput.style.cssText = 'width:100%;border:1px solid #dadce0;border-radius:6px;padding:6px 10px;font-size:13px;margin-bottom:8px;box-sizing:border-box;';
    if (item.aggregationDocId) {
      urlInput.value = 'https://docs.google.com/document/d/' + item.aggregationDocId + '/edit';
    }
    editView.appendChild(urlInput);

    const statusEl = document.createElement('div');
    statusEl.className = 'status';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-primary';
    saveBtn.style.cssText = 'width:100%;justify-content:center;';
    saveBtn.textContent = item.defined ? 'Save' : 'Link Tag';
    saveBtn.onclick = function () {
      const url = urlInput.value.trim();
      if (!url) { showEl(statusEl, 'Enter an aggregation doc URL.', 'error'); return; }
      showEl(statusEl, 'Saving…', 'info');
      saveBtn.disabled = true;
      google.script.run
        .withSuccessHandler(function (result) {
          saveBtn.disabled = false;
          statusEl.className = 'status';
          docLink.href = 'https://docs.google.com/document/d/' + result.aggregationDocId + '/edit';
          docLink.textContent = result.aggregationDocName || result.aggregationDocId;
          linkedView.style.display = 'flex';
          editView.style.display = 'none';
        })
        .withFailureHandler(function (err) {
          saveBtn.disabled = false;
          showEl(statusEl, err.message, 'error');
        })
        .createTag(item.name, url);
    };

    editView.appendChild(saveBtn);
    editView.appendChild(statusEl);

    // X toggles to edit view
    removeBtn.onclick = function (e) {
      e.stopPropagation();
      linkedView.style.display = 'none';
      editView.style.display = 'block';
    };

    body.appendChild(linkedView);
    body.appendChild(editView);

    // Toggle expand/collapse.
    header.onclick = function () {
      const isOpen = body.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
      openCard = isOpen ? item.name : null;
    };

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  // ── Ghost tag (defined but not in doc) ───────────────────────────────────────

  function buildGhostTag(tag) {
    const el = document.createElement('div');
    el.className = 'ghost-tag';
    el.textContent = tag.name;
    return el;
  }

  // ── Sync ──────────────────────────────────────────────────────────────────────

  function syncAll() {
    setHeaderLoading(true);
    setHeaderStatus('Syncing…');

    google.script.run
      .withSuccessHandler(function (res) {
        setHeaderLoading(false);
        const errCount = Object.keys(res.errors).length;
        if (errCount > 0) {
          setHeaderStatus('');
          const synced = Object.values(res.results).reduce(function (s, r) { return s + r.synced; }, 0);
          showStatus('status-top', synced + ' synced, ' + errCount + ' error(s) — check individual tags.', 'error');
        } else {
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          setHeaderStatus('Synced at ' + time);
        }
      })
      .withFailureHandler(function (err) {
        setHeaderLoading(false);
        setHeaderStatus('');
        showStatus('status-top', err.message, 'error');
      })
      .syncAllTags();
  }

  // ── Delete tag ────────────────────────────────────────────────────────────────

  function deleteTag(tagId) {
    google.script.run
      .withSuccessHandler(function () { loadSummary(); })
      .withFailureHandler(function (err) {
        showStatus('status-top', err.message, 'error');
      })
      .deleteTag(tagId);
  }

  // ── Create form ───────────────────────────────────────────────────────────────

  function toggleCreateForm(prefillName) {
    const form = document.getElementById('create-form');
    const visible = form.style.display !== 'none';
    form.style.display = visible ? 'none' : 'block';
    if (!visible) {
      document.getElementById('new-tag-name').value = prefillName || '';
      document.getElementById('new-agg-url').value = '';
      clearStatus('status-create');
    }
  }

  function submitCreateTag() {
    const name = document.getElementById('new-tag-name').value.trim();
    const url  = document.getElementById('new-agg-url').value.trim();

    if (!name) { showStatus('status-create', 'Enter a tag name.', 'error'); return; }
    if (!url)  { showStatus('status-create', 'Enter an aggregation doc URL.', 'error'); return; }

    showStatus('status-create', 'Linking…', 'info');

    google.script.run
      .withSuccessHandler(function (result) {
        showStatus('status-create', '✓ Tag "' + result.name + '" linked!', 'success');
        setTimeout(function () {
          toggleCreateForm();
          loadSummary();
        }, 700);
      })
      .withFailureHandler(function (err) {
        showStatus('status-create', err.message, 'error');
      })
      .createTag(name, url);
  }

  // ── Utilities ─────────────────────────────────────────────────────────────────

  function revealDocSection() {
    if (initialLoad) {
      initialLoad = false;
      document.getElementById('initial-loader').style.display = 'none';
      document.getElementById('in-doc-section').style.display = 'block';
    }
  }

  function setHeaderLoading(on) {
    document.getElementById('btn-refresh').disabled = on;
    document.getElementById('btn-sync-all').disabled = on;
  }

  function setHeaderStatus(msg) {
    document.getElementById('header-status').textContent = msg;
  }

  function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status ' + type + ' show';
  }

  function showEl(el, msg, type) {
    el.textContent = msg;
    el.className = 'status ' + type + ' show';
  }

  function clearStatus(id) {
    const el = document.getElementById(id);
    if (el) { el.className = 'status'; el.textContent = ''; }
  }

  function esc(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
</script>

</body>
</html>
